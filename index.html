<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Apresentação TIB</title>
    <link rel="stylesheet" href="design-tokens.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--blue-deep);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Área invisível que ativa o nav ao passar o mouse */
        #nav-trigger {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            z-index: var(--z-nav);
        }

        #nav {
            position: fixed;
            bottom: var(--sp-5);
            left: 50%;
            transform: translateX(-50%);
            z-index: var(--z-cursor);
            display: flex;
            align-items: center;
            gap: var(--sp-4);
            padding: var(--sp-3) var(--sp-5);
            border-radius: var(--radius-lg);
            background: rgba(1, 10, 38, 0.75);
            border: var(--border-gold);
            backdrop-filter: blur(8px);
            opacity: 0;
            transition: opacity var(--transition-base);
        }

        #nav-trigger:hover + #nav,
        #nav:hover {
            opacity: 1;
        }

        button {
            background: var(--white-12);
            border: var(--border-white);
            color: var(--white);
            padding: var(--sp-2) var(--sp-5);
            cursor: pointer;
            border-radius: var(--radius-md);
            font-family: var(--font-display);
            font-size: var(--text-xs);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: background var(--transition-fast), border-color var(--transition-fast);
        }

        button:hover {
            background: var(--white-25);
            border-color: var(--gold-50);
            color: var(--gold-light);
        }

        button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        #counter {
            color: var(--gold);
            font-family: var(--font-display);
            font-weight: 600;
            font-size: var(--text-xs);
            letter-spacing: 0.12em;
            min-width: 56px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="nav-trigger"></div>
    <div id="nav">
        <button id="prev" onclick="prev()">Anterior</button>
        <span id="counter"></span>
        <button id="next" onclick="next()">Próximo</button>
    </div>
    
    <iframe id="viewer"></iframe>

    <script>
        const pages = [
            "6889c58f-5abe-4a7a-b7fd-0d9856245d74.htm",
            "d44e90f7-4cba-419a-8fb6-e67b9f1c3244.htm",
            "fed32750-c044-4f3c-85eb-569045ba5cd5.htm",
            "a23cc662-dd07-4e88-ad78-4390fb4159b5.htm",
            "decb2a9f-0689-4ab8-be02-57d48b45364d.htm",
            "2595c031-784a-4bcc-926b-40930d15d505.htm",
            "b52cd9d4-d5d6-4bfd-b3c8-3978f01817dc.htm",
            "condicoes.htm",
            "467f4cfd-096f-43c8-ae7f-ff5c63804069.htm",
            "8ca20ea5-73c0-45e7-bbc7-9318fcf90089.htm"
        ];
        
        let currentIndex = 0;
        const viewer = document.getElementById('viewer');
        const counter = document.getElementById('counter');
        const btnPrev = document.getElementById('prev');
        const btnNext = document.getElementById('next');

        function update() {
            viewer.src = pages[currentIndex];
            counter.innerText = (currentIndex + 1) + " / " + pages.length;
            btnPrev.disabled = currentIndex === 0;
            btnNext.disabled = currentIndex === pages.length - 1;
        }

        function next() {
            if (currentIndex < pages.length - 1) {
                currentIndex++;
                update();
            }
        }

        function prev() {
            if (currentIndex > 0) {
                currentIndex--;
                update();
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
                next();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                prev();
            }
        });

        viewer.onload = function() {
            try {
                const cw = viewer.contentWindow;
                const cd = viewer.contentDocument;

                // Handle the custom cursor logic
                const cur = cd.getElementById('cur');
                const curR = cd.getElementById('cur-r');
                
                // Hide them initially so they don't look frozen until mouse moves
                if(cur) cur.style.opacity = '0';
                if(curR) curR.style.opacity = '0';
                
                cw.addEventListener('mousemove', (e) => {
                    if(cur) {
                        cur.style.opacity = '1';
                        cur.style.left = (e.clientX - 5) + 'px';
                        cur.style.top = (e.clientY - 5) + 'px';
                        cur.style.transition = 'none';
                    }
                    if(curR) {
                        curR.style.opacity = '1';
                        curR.style.left = (e.clientX - 16) + 'px';
                        curR.style.top = (e.clientY - 16) + 'px';
                        curR.style.transition = 'left 0.15s ease-out, top 0.15s ease-out';
                    }
                });

                // Handle keyboard navigation inside iframe
                cw.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
                        next();
                    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                        prev();
                    }
                });
                cw.focus();
            } catch(err) {
                console.log("Could not bind iframe events: " + err);
            }
        };

        update();
    </script>
</body>
</html>
