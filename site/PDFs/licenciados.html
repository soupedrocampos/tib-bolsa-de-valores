<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIB — Licenciados</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a0a;
    font-family: sans-serif;
    overflow: hidden;
  }

  #toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 44px;
    background: rgba(1, 8, 30, 0.97);
    border-bottom: 1px solid rgba(217, 184, 85, 0.28);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  #toolbar button {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.22);
    color: #fff;
    padding: 5px 16px;
    cursor: pointer;
    border-radius: 5px;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: background 0.15s, border-color 0.15s;
  }
  #toolbar button:hover { background: rgba(255,255,255,0.18); border-color: rgba(217,184,85,0.6); color: #F2DEA0; }
  #toolbar button:disabled { opacity: 0.3; cursor: not-allowed; }

  #page-info {
    color: #D9B855;
    font-size: 12px;
    letter-spacing: 0.12em;
    min-width: 80px;
    text-align: center;
  }

  #viewer-wrap {
    position: fixed;
    top: 44px; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #111;
  }

  #pdf-canvas {
    display: block;
    max-width: 100%;
    max-height: 100%;
    box-shadow: 0 4px 32px rgba(0,0,0,0.6);
  }

  #loading {
    position: absolute;
    color: rgba(217,184,85,0.7);
    font-size: 13px;
    letter-spacing: 0.2em;
  }
</style>
</head>
<body>

<div id="toolbar">
  <button id="btn-prev" onclick="changePage(-1)" disabled>&#8592; Anterior</button>
  <span id="page-info">— / —</span>
  <button id="btn-next" onclick="changePage(1)" disabled>Próximo &#8594;</button>
</div>

<div id="viewer-wrap">
  <span id="loading">CARREGANDO...</span>
  <canvas id="pdf-canvas"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const PDF_URL = 'TIB-LICENCIADOS-NACIONAL.pdf';

  let pdfDoc = null;
  let currentPage = 1;
  let rendering = false;

  const canvas  = document.getElementById('pdf-canvas');
  const ctx     = canvas.getContext('2d');
  const info    = document.getElementById('page-info');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  const loading = document.getElementById('loading');

  function renderPage(num) {
    if (rendering) return;
    rendering = true;

    pdfDoc.getPage(num).then(page => {
      const wrap = document.getElementById('viewer-wrap');
      const availW = wrap.clientWidth  - 32;
      const availH = wrap.clientHeight - 32;

      const vpBase   = page.getViewport({ scale: 1 });
      const scaleW   = availW / vpBase.width;
      const scaleH   = availH / vpBase.height;
      const scale    = Math.min(scaleW, scaleH);
      const viewport = page.getViewport({ scale });

      canvas.width  = viewport.width;
      canvas.height = viewport.height;

      page.render({ canvasContext: ctx, viewport }).promise.then(() => {
        rendering = false;
        loading.style.display = 'none';
        info.textContent = num + ' / ' + pdfDoc.numPages;
        btnPrev.disabled = num <= 1;
        btnNext.disabled = num >= pdfDoc.numPages;
      });
    });
  }

  function changePage(delta) {
    const next = currentPage + delta;
    if (next < 1 || next > pdfDoc.numPages) return;
    currentPage = next;
    renderPage(currentPage);
  }

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') changePage(1);
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') changePage(-1);
  });

  // Load PDF
  pdfjsLib.getDocument(PDF_URL).promise.then(pdf => {
    pdfDoc = pdf;
    renderPage(currentPage);
  });

  // Re-render on resize
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => renderPage(currentPage), 200);
  });
</script>
</body>
</html>
