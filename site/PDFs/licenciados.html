<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIB — Licenciados</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #0d0d1a; font-family: sans-serif; overflow: hidden; }

  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; height: 48px;
    background: rgba(1,8,30,0.97);
    border-bottom: 1px solid rgba(217,184,85,0.28);
    display: flex; align-items: center; justify-content: center; gap: 16px;
    z-index: 100; backdrop-filter: blur(12px);
  }
  #toolbar button {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.22);
    color: #fff; padding: 6px 18px; cursor: pointer; border-radius: 5px;
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    transition: background 0.15s, border-color 0.15s;
  }
  #toolbar button:hover { background: rgba(255,255,255,0.18); border-color: rgba(217,184,85,0.6); color: #F2DEA0; }
  #toolbar button:disabled { opacity: 0.3; cursor: not-allowed; }
  #page-info { color: #D9B855; font-size: 12px; letter-spacing: 0.12em; min-width: 80px; text-align: center; }

  #wrap {
    position: fixed; top: 48px; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    background: #111; overflow: hidden;
  }
  canvas { display: block; max-width: 100%; max-height: 100%; box-shadow: 0 4px 32px rgba(0,0,0,0.7); }

  #status {
    position: absolute; color: rgba(217,184,85,0.7);
    font-size: 13px; letter-spacing: 0.2em; text-align: center;
    padding: 0 20px;
  }
  #status a { color: #D9B855; text-decoration: underline; display: block; margin-top: 16px; font-size: 12px; }
</style>
</head>
<body>
<div id="toolbar">
  <button id="btn-prev" onclick="changePage(-1)" disabled>&#8592; Anterior</button>
  <span id="page-info">— / —</span>
  <button id="btn-next" onclick="changePage(1)" disabled>Próximo &#8594;</button>
</div>
<div id="wrap">
  <span id="status">CARREGANDO PDF...</span>
  <canvas id="cv"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  const PDF_URL = 'TIB-LICENCIADOS-NACIONAL.pdf';

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let pdfDoc = null, currentPage = 1, rendering = false;
  const cv      = document.getElementById('cv');
  const ctx     = cv.getContext('2d');
  const info    = document.getElementById('page-info');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  const status  = document.getElementById('status');

  function renderPage(num) {
    if (rendering) return;
    rendering = true;
    pdfDoc.getPage(num).then(page => {
      const wrap  = document.getElementById('wrap');
      const scale = Math.min((wrap.clientWidth - 32) / page.getViewport({scale:1}).width,
                             (wrap.clientHeight - 32) / page.getViewport({scale:1}).height);
      const vp    = page.getViewport({ scale });
      cv.width  = vp.width;
      cv.height = vp.height;
      page.render({ canvasContext: ctx, viewport: vp }).promise.then(() => {
        rendering = false;
        status.style.display = 'none';
        cv.style.display = 'block';
        info.textContent  = num + ' / ' + pdfDoc.numPages;
        btnPrev.disabled  = num <= 1;
        btnNext.disabled  = num >= pdfDoc.numPages;
      });
    });
  }

  function changePage(delta) {
    const n = currentPage + delta;
    if (!pdfDoc || n < 1 || n > pdfDoc.numPages) return;
    currentPage = n;
    renderPage(currentPage);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ') changePage(1);
    else if (e.key === 'ArrowLeft') changePage(-1);
  });

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => { if (pdfDoc) renderPage(currentPage); }, 200);
  });

  pdfjsLib.getDocument(PDF_URL).promise.then(pdf => {
    pdfDoc = pdf;
    renderPage(1);
  }).catch(() => {
    status.innerHTML = 'Não foi possível carregar o PDF.<a href="' + PDF_URL + '" download>Clique aqui para baixar</a>';
  });
</script>
</body>
</html>
