<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIB Licenciados — Capa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600;700&family=Raleway:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#D9B855;--gold-light:#F2DEA0;--gold-dark:#A66617;--gold-deep:#734610;
  --gold-50:rgba(217,184,85,0.50);--gold-30:rgba(217,184,85,0.30);--gold-20:rgba(217,184,85,0.20);--gold-10:rgba(217,184,85,0.10);
  --gold-grad:linear-gradient(135deg,#F2DEA0 0%,#D9B855 30%,#A66617 65%,#734610 100%);
  --gold-grad-h:linear-gradient(90deg,#734610 0%,#A66617 15%,#D9B855 35%,#F2DEA0 50%,#D9B855 65%,#A66617 82%,#734610 100%);
  --blue-deep:#010A26;--blue-royal:#00113F;--blue-mid:#011640;
  --bg:linear-gradient(160deg,#000814 0%,#010D30 18%,#001240 40%,#011A55 65%,#021440 85%,#010A26 100%);
  --white:#fff;--white-80:rgba(255,255,255,0.80);--white-60:rgba(255,255,255,0.60);--white-20:rgba(255,255,255,0.20);
  --font-display:"Oswald",sans-serif;--font-body:"Raleway",sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);font-family:var(--font-body);overflow:hidden;cursor:none}
#cur{position:fixed;width:10px;height:10px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference}
#cur-r{position:fixed;width:32px;height:32px;border:1px solid var(--gold-50);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%)}

.slide{
  width:100vw;height:100vh;
  display:grid;
  grid-template-columns:1fr 1fr;
  position:relative;
  overflow:hidden;
  background:var(--bg);
}

/* Background geometry */
.bg-geo{
  position:absolute;inset:0;pointer-events:none;
  overflow:hidden;
}
.bg-geo::before{
  content:'';
  position:absolute;
  right:-10vw;top:-10vh;
  width:60vw;height:120vh;
  background:linear-gradient(135deg,rgba(217,184,85,0.03) 0%,rgba(217,184,85,0.06) 50%,transparent 100%);
  transform:skewX(-8deg);
}
.bg-geo::after{
  content:'';
  position:absolute;
  right:0;top:0;
  width:1px;height:100%;
  background:linear-gradient(to bottom,transparent 0%,var(--gold-30) 30%,var(--gold-50) 50%,var(--gold-30) 70%,transparent 100%);
}

/* Corner accent */
.corner-tl{position:absolute;top:0;left:0;width:120px;height:120px;pointer-events:none}
.corner-tl::before{content:'';position:absolute;top:clamp(16px,3vh,32px);left:clamp(16px,3vw,32px);width:60px;height:1px;background:var(--gold-grad-h)}
.corner-tl::after{content:'';position:absolute;top:clamp(16px,3vh,32px);left:clamp(16px,3vw,32px);width:1px;height:60px;background:linear-gradient(to bottom,var(--gold),transparent)}

.corner-br{position:absolute;bottom:0;right:0;width:120px;height:120px;pointer-events:none}
.corner-br::before{content:'';position:absolute;bottom:clamp(16px,3vh,32px);right:clamp(16px,3vw,32px);width:60px;height:1px;background:var(--gold-grad-h)}
.corner-br::after{content:'';position:absolute;bottom:clamp(16px,3vh,32px);right:clamp(16px,3vw,32px);width:1px;height:60px;background:linear-gradient(to top,var(--gold),transparent)}

/* Left panel */
.panel-left{
  display:flex;flex-direction:column;justify-content:center;
  padding:clamp(48px,8vh,100px) clamp(32px,6vw,88px);
  position:relative;z-index:1;
}

.eyebrow{
  display:flex;align-items:center;gap:12px;
  margin-bottom:clamp(24px,4vh,48px);
  animation:fadeUp 0.8s ease both 0.1s;
}
.eyebrow-line{width:32px;height:1px;background:var(--gold)}
.eyebrow-text{
  font-family:var(--font-display);
  font-size:clamp(9px,0.9vw,12px);
  letter-spacing:0.35em;
  text-transform:uppercase;
  color:var(--gold);
  opacity:0.8;
}

h1{
  font-family:var(--font-display);
  font-weight:600;
  font-size:clamp(48px,7.5vw,108px);
  line-height:0.95;
  letter-spacing:-0.02em;
  background:var(--gold-grad);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:clamp(8px,1.5vh,16px);
  animation:fadeUp 0.9s ease both 0.25s;
}

.h1-sub{
  font-family:var(--font-display);
  font-weight:600;
  font-size:clamp(16px,2.2vw,32px);
  letter-spacing:0.3em;
  text-transform:uppercase;
  color:var(--gold-50);
  margin-bottom:clamp(24px,4vh,48px);
  animation:fadeUp 0.9s ease both 0.35s;
}

.divider{
  width:48px;height:2px;
  background:var(--gold-grad-h);
  margin-bottom:clamp(20px,3.5vh,40px);
  animation:fadeUp 0.9s ease both 0.45s;
}

.tagline{
  font-family:var(--font-body);
  font-weight:500;
  font-size:clamp(14px,1.4vw,20px);
  color:var(--white-80);
  line-height:1.7;
  max-width:38ch;
  animation:fadeUp 0.9s ease both 0.55s;
}
.tagline strong{color:var(--gold-light);font-weight:500}

.stamp{
  margin-top:clamp(32px,5vh,56px);
  display:inline-flex;align-items:center;gap:10px;
  border:1px solid var(--gold-30);
  border-radius:3px;
  padding:8px 16px;
  width:fit-content;
  animation:fadeUp 0.9s ease both 0.65s;
}
.stamp span{
  font-family:var(--font-display);
  font-size:clamp(9px,0.85vw,11px);
  letter-spacing:0.25em;
  text-transform:uppercase;
  color:var(--gold-50);
}
.stamp-dot{width:5px;height:5px;border-radius:50%;background:var(--gold)}

/* Right panel — large TIB monogram */
.panel-right{
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;
}

.monogram-wrap{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  animation:fadeIn 1.2s ease both 0.4s;
}

.monogram-ring{
  width:clamp(200px,28vw,420px);
  height:clamp(200px,28vw,420px);
  border-radius:50%;
  border:1px solid var(--gold-20);
  position:absolute;
  animation:spin 30s linear infinite;
}
.monogram-ring::before{
  content:'';
  position:absolute;
  top:-3px;left:50%;
  width:6px;height:6px;
  border-radius:50%;
  background:var(--gold);
  transform:translateX(-50%);
}

.monogram-ring-inner{
  width:clamp(160px,22vw,330px);
  height:clamp(160px,22vw,330px);
  border-radius:50%;
  border:1px solid var(--gold-10);
  position:absolute;
  animation:spin 20s linear infinite reverse;
}

.monogram{
  font-family:var(--font-display);
  font-weight:600;
  font-size:clamp(80px,12vw,180px);
  letter-spacing:-0.05em;
  background:var(--gold-grad);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;
  position:relative;z-index:1;
}

.monogram-sub{
  position:absolute;
  bottom:-clamp(20px,3vw,40px);
  left:50%;transform:translateX(-50%);
  font-family:var(--font-display);
  font-size:clamp(7px,0.8vw,10px);
  letter-spacing:0.4em;
  text-transform:uppercase;
  color:var(--gold-50);
  white-space:nowrap;
}

/* Horizontal shimmer line bottom */
.shimmer-line{
  position:absolute;
  bottom:0;left:0;right:0;height:2px;
  background:var(--gold-grad-h);
  opacity:0.5;
}

.bg-svg{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0;background:radial-gradient(ellipse 70% 55% at 8% 92%,rgba(0,35,110,0.55) 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 90% 5%,rgba(0,25,85,0.4) 0%,transparent 50%)}
.bg-svg svg{position:absolute;bottom:0;right:5%;width:52%;height:78%;opacity:0.055;stroke:var(--gold);fill:none}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

@media(max-width:768px){
  .slide{grid-template-columns:1fr;grid-template-rows:1fr auto}
  .panel-right{display:none}
  .panel-left{justify-content:center;padding:10vw 8vw}
  h1{font-size:clamp(40px,12vw,72px)}
}
</style>
</head>
<body>
<div id="cur"></div>
<div id="cur-r"></div>

<section class="slide">
  <div class="bg-svg">
    <!-- City skyline / buildings -->
    <svg viewBox="0 0 600 500" stroke-width="1.2" xmlns="http://www.w3.org/2000/svg">
      <!-- Tall center tower -->
      <rect x="270" y="60" width="60" height="440"/>
      <rect x="280" y="40" width="40" height="30"/>
      <line x1="300" y1="20" x2="300" y2="40"/>
      <!-- Windows grid on center tower -->
      <line x1="290" y1="80" x2="320" y2="80"/><line x1="290" y1="110" x2="320" y2="110"/>
      <line x1="290" y1="140" x2="320" y2="140"/><line x1="290" y1="170" x2="320" y2="170"/>
      <line x1="290" y1="200" x2="320" y2="200"/><line x1="290" y1="230" x2="320" y2="230"/>
      <line x1="290" y1="260" x2="320" y2="260"/><line x1="290" y1="290" x2="320" y2="290"/>
      <line x1="305" y1="60" x2="305" y2="500"/>
      <!-- Left buildings -->
      <rect x="170" y="160" width="80" height="340"/>
      <rect x="80" y="240" width="70" height="260"/>
      <rect x="20" y="300" width="50" height="200"/>
      <!-- Right buildings -->
      <rect x="350" y="130" width="90" height="370"/>
      <rect x="460" y="200" width="75" height="300"/>
      <rect x="550" y="280" width="50" height="220"/>
      <!-- Ground line -->
      <line x1="0" y1="500" x2="600" y2="500"/>
      <!-- Antenna lines -->
      <line x1="210" y1="130" x2="210" y2="160"/><line x1="395" y1="100" x2="395" y2="130"/>
    </svg>
  </div>
  <div class="bg-geo"></div>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>

  <div class="panel-left">
    <div class="eyebrow">
      <span class="eyebrow-line"></span>
      <span class="eyebrow-text">Expansão Nacional &amp; Internacional</span>
    </div>

    <h1>THE BEST<br>INVEST</h1>
    <p class="h1-sub"><img src="../LOGO.png" alt="TIB" style="height:clamp(18px,2vw,28px);filter:brightness(0) invert(1);opacity:0.7;vertical-align:middle"></p>

    <div class="divider"></div>

    <p class="tagline">
      Modelo <strong>escalável, tecnológico e rentável</strong>.<br>
      Construído para liderar o mercado imobiliário<br>
      do Brasil e do mundo.
    </p>

    <div class="stamp">
      <span class="stamp-dot"></span>
      <span>tib.imob &nbsp;·&nbsp; Programa de Licenciados</span>
    </div>
  </div>

  <div class="panel-right">
    <div class="monogram-wrap">
      <div class="monogram-ring"></div>
      <div class="monogram-ring-inner"></div>
      <img src="../LOGO.png" alt="TIB" style="width:clamp(130px,18vw,260px);filter:brightness(0) invert(1);position:relative;z-index:1;display:block">
      <span class="monogram-sub">The Best Invest</span>
    </div>
  </div>

  <div class="shimmer-line"></div>
</section>
</body>
</html>
