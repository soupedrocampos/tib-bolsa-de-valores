<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIB Treinamento — O Melhor Vendedor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600;700&family=Raleway:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#D9B855;--gold-light:#F2DEA0;--gold-dark:#A66617;--gold-deep:#734610;
  --gold-50:rgba(217,184,85,0.50);--gold-30:rgba(217,184,85,0.30);--gold-20:rgba(217,184,85,0.20);--gold-10:rgba(217,184,85,0.10);
  --gold-grad:linear-gradient(135deg,#F2DEA0 0%,#D9B855 30%,#A66617 65%,#734610 100%);
  --gold-grad-h:linear-gradient(90deg,#734610 0%,#A66617 15%,#D9B855 35%,#F2DEA0 50%,#D9B855 65%,#A66617 82%,#734610 100%);
  --bg:linear-gradient(160deg,#010A26 0%,#010D30 18%,#001240 40%,#011A55 65%,#021440 85%,#010A26 100%);
  --white-80:rgba(255,255,255,0.80);--white-60:rgba(255,255,255,0.60);--white-20:rgba(255,255,255,0.20);
  --font-display:"Oswald",sans-serif;--font-body:"Raleway",sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);font-family:var(--font-body);overflow:hidden;cursor:none}
#cur{position:fixed;width:10px;height:10px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference}
#cur-r{position:fixed;width:32px;height:32px;border:1px solid var(--gold-50);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%)}

.slide{
  width:100vw;height:100vh;
  display:grid;
  grid-template-columns:1fr 1fr;
  position:relative;overflow:hidden;
  background:var(--bg);
}

/* BG geo */
.bg-geo{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.bg-geo::before{
  content:'';position:absolute;right:-8vw;top:-10vh;
  width:58vw;height:120vh;
  background:linear-gradient(135deg,rgba(217,184,85,0.025) 0%,rgba(217,184,85,0.05) 50%,transparent 100%);
  transform:skewX(-8deg);
}
.bg-geo::after{
  content:'';position:absolute;right:0;top:0;width:1px;height:100%;
  background:linear-gradient(to bottom,transparent 0%,var(--gold-30) 30%,var(--gold-50) 50%,var(--gold-30) 70%,transparent 100%);
}

/* BG dots */
.bg-dots{position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(circle,rgba(217,184,85,0.07) 1px,transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(ellipse 60% 70% at 20% 50%,black 0%,transparent 70%);
}

/* Corners */
.corner{position:absolute;width:100px;height:100px;pointer-events:none}
.corner-tl{top:0;left:0}
.corner-tl::before{content:'';position:absolute;top:clamp(16px,3vh,28px);left:clamp(16px,3vw,28px);width:56px;height:1px;background:var(--gold-grad-h)}
.corner-tl::after{content:'';position:absolute;top:clamp(16px,3vh,28px);left:clamp(16px,3vw,28px);width:1px;height:56px;background:linear-gradient(to bottom,var(--gold),transparent)}
.corner-br{bottom:0;right:0}
.corner-br::before{content:'';position:absolute;bottom:clamp(16px,3vh,28px);right:clamp(16px,3vw,28px);width:56px;height:1px;background:var(--gold-grad-h)}
.corner-br::after{content:'';position:absolute;bottom:clamp(16px,3vh,28px);right:clamp(16px,3vw,28px);width:1px;height:56px;background:linear-gradient(to top,var(--gold),transparent)}

/* Left */
.panel-left{
  display:flex;flex-direction:column;justify-content:center;
  padding:clamp(48px,8vh,96px) clamp(32px,5vw,80px);
  position:relative;z-index:2;
}

.eyebrow{
  display:flex;align-items:center;gap:12px;
  margin-bottom:clamp(20px,3.5vh,40px);
  animation:fadeUp 0.8s ease both 0.1s;
}
.eyebrow-line{width:32px;height:1px;background:var(--gold);flex-shrink:0}
.eyebrow-text{
  font-family:var(--font-display);font-size:clamp(8px,0.8vw,11px);
  letter-spacing:0.35em;text-transform:uppercase;color:var(--gold);opacity:0.75;
}

h1{
  font-family:var(--font-display);font-weight:600;
  font-size:clamp(38px,6vw,88px);line-height:0.92;letter-spacing:-0.02em;
  background:var(--gold-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:clamp(8px,1.2vh,14px);
  animation:fadeUp 0.9s ease both 0.25s;
}

.h1-eng{
  font-family:var(--font-display);font-weight:200;
  font-size:clamp(13px,1.6vw,22px);letter-spacing:0.2em;text-transform:uppercase;
  color:var(--gold-50);margin-bottom:clamp(20px,3.5vh,40px);
  animation:fadeUp 0.9s ease both 0.35s;
}

.divider{width:48px;height:2px;background:var(--gold-grad-h);margin-bottom:clamp(16px,2.8vh,32px);animation:fadeUp 0.9s ease both 0.42s}

.author{
  font-family:var(--font-body);font-weight:500;
  font-size:clamp(13px,1.2vw,17px);color:var(--white-80);
  margin-bottom:clamp(28px,5vh,56px);
  animation:fadeUp 0.9s ease both 0.5s;
}
.author span{color:var(--gold-light)}

.pills{
  display:flex;flex-wrap:wrap;gap:8px;
  animation:fadeUp 0.9s ease both 0.62s;
}
.pill{
  font-family:var(--font-display);font-size:clamp(7px,0.72vw,10px);
  letter-spacing:0.2em;text-transform:uppercase;
  padding:5px 12px;border-radius:100px;
  border:1px solid;
}
.pill-gold{border-color:rgba(217,184,85,0.45);color:rgba(217,184,85,0.85);background:rgba(217,184,85,0.06)}
.pill-teal{border-color:rgba(0,200,180,0.45);color:rgba(0,200,180,0.85);background:rgba(0,200,180,0.06)}
.pill-purple{border-color:rgba(160,80,220,0.45);color:rgba(160,80,220,0.85);background:rgba(160,80,220,0.06)}

/* Right */
.panel-right{
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:2;
}

.mono-wrap{
  position:relative;display:flex;align-items:center;justify-content:center;
  animation:fadeIn 1.2s ease both 0.4s;
}

.ring-outer{
  width:clamp(200px,27vw,400px);height:clamp(200px,27vw,400px);
  border-radius:50%;border:1px solid var(--gold-20);
  position:absolute;animation:spin 32s linear infinite;
}
.ring-outer::before{
  content:'';position:absolute;top:-4px;left:50%;
  width:8px;height:8px;border-radius:50%;background:var(--gold);
  transform:translateX(-50%);
}
.ring-outer::after{
  content:'';position:absolute;bottom:-4px;left:50%;
  width:5px;height:5px;border-radius:50%;background:var(--gold-dark);
  transform:translateX(-50%);
}

.ring-mid{
  width:clamp(158px,21vw,316px);height:clamp(158px,21vw,316px);
  border-radius:50%;border:1px solid var(--gold-10);
  position:absolute;animation:spin 22s linear infinite reverse;
}
.ring-mid::before{
  content:'';position:absolute;right:-4px;top:50%;
  width:6px;height:6px;border-radius:50%;background:rgba(217,184,85,0.5);
  transform:translateY(-50%);
}

.ring-inner{
  width:clamp(112px,15vw,224px);height:clamp(112px,15vw,224px);
  border-radius:50%;border:1px solid rgba(217,184,85,0.06);
  position:absolute;animation:spin 15s linear infinite;
}

.mono-letters{
  font-family:var(--font-display);font-weight:600;
  font-size:clamp(64px,9.5vw,148px);letter-spacing:-0.05em;
  background:var(--gold-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;position:relative;z-index:1;
}

.mono-sub{
  position:absolute;bottom:clamp(-28px,-4vw,-14px);
  left:50%;transform:translateX(-50%);
  font-family:var(--font-display);font-size:clamp(7px,0.75vw,10px);
  letter-spacing:0.4em;text-transform:uppercase;color:var(--gold-50);
  white-space:nowrap;
}

.shimmer-line{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold-grad-h);opacity:0.45}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

@media(max-width:768px){
  .slide{grid-template-columns:1fr}
  .panel-right{display:none}
  .panel-left{justify-content:center;padding:10vw 8vw}
  h1{font-size:clamp(38px,11vw,68px)}
}
</style>
</head>
<body>
<div id="cur"></div>
<div id="cur-r"></div>

<section class="slide">
  <div class="bg-dots"></div>
  <div class="bg-geo"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-br"></div>

  <div class="panel-left">
    <div class="eyebrow">
      <span class="eyebrow-line"></span>
      <span class="eyebrow-text">Treinamento</span>
    </div>

    <h1>O MELHOR<br>VENDEDOR<br>DE TODOS<br>OS TEMPOS</h1>
    <p class="h1-eng">The Best Salesman Ever</p>
    <div class="divider"></div>
    <p class="author"><span>Patrick Piccoli</span> · Universo Corporativo</p>

    <div class="pills">
      <span class="pill pill-gold">Bloco 1 · Ação</span>
      <span class="pill pill-teal">Bloco 2 · Neurociência</span>
      <span class="pill pill-purple">Bloco 3 · Estratégia</span>
    </div>
  </div>

  <div class="panel-right">
    <div class="mono-wrap">
      <div class="ring-outer"></div>
      <div class="ring-mid"></div>
      <div class="ring-inner"></div>
      <span class="mono-letters">TBS</span>
      <span class="mono-sub">The Best Salesman</span>
    </div>
  </div>

  <div class="shimmer-line"></div>
</section>
<script>
const cur=document.getElementById('cur'),curR=document.getElementById('cur-r');
document.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';curR.style.left=e.clientX+'px';curR.style.top=e.clientY+'px';});
</script>
</body>
</html>
