<!DOCTYPE html>

  <title>TIB — Todas as Apresentações (PDF)</title>
  <style>
    @page {
      size: 1280px 720px;
      margin: 0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000814;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* UI de tela — some na impressão */
    #ui {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 0 10px;
      background: rgba(1, 8, 30, 0.95);
      border-bottom: 1px solid rgba(217, 184, 85, 0.3);
      gap: 8px;
    }

    #print-btn {
      padding: 12px 40px;
      background: #D9B855;
      color: #010A26;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.12em;
      font-family: sans-serif;
      box-shadow: 0 4px 20px rgba(217,184,85,0.4);
    }

    #print-btn:hover:not(:disabled) { background: #F2DEA0; }
    #print-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #status {
      color: rgba(217, 184, 85, 0.7);
      font-family: sans-serif;
      font-size: 12px;
      letter-spacing: 0.1em;
    }

    @media print {
      #ui { display: none; }
    }

    /* Slides */
    .slide-page {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      page-break-after: always;
      break-after: page;
      position: relative;
    }

    .slide-page iframe {
      width: 1280px;
      height: 720px;
      border: none;
      display: block;
    }

    /* Separador entre apresentações (visível só na tela) */
    .section-label {
      width: 1280px;
      padding: 20px 40px;
      background: #010A26;
      color: rgba(217,184,85,0.6);
      font-family: sans-serif;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      border-top: 1px solid rgba(217,184,85,0.2);
      border-bottom: 1px solid rgba(217,184,85,0.2);
    }

    @media print {
      .section-label { display: none; }
    }
  </style>
</head>

  <script>
    const frames = document.querySelectorAll('iframe');
    const status = document.getElementById('status');
    const btn = document.getElementById('print-btn');
    const total = frames.length;
    let loaded = 0;
    let ready = false;

    const PRINT_FIX = '*, *::before, *::after { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }';

    frames.forEach(f => {
      f.addEventListener('load', () => {
        try {
          const s = f.contentDocument.createElement('style');
          s.textContent = PRINT_FIX;
          f.contentDocument.head.appendChild(s);
        } catch(e) {}
        loaded++;
        if (loaded < total) {
          status.textContent = `Carregando slides… ${loaded} / ${total}`;
        } else {
          ready = true;
          btn.disabled = false;
          btn.onclick = () => window.print();
          status.textContent = `Todos os ${total} slides prontos! Clique no botão para salvar.`;
          status.style.color = 'rgba(217,184,85,1)';
        }
      });
    });

    // Bloqueia Ctrl+P enquanto não estiver pronto
    window.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
        if (!ready) e.preventDefault();
      }
    });
  </script>
